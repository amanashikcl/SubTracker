server {
    listen 80;
    server_name subtrackerapp.tech www.subtrackerapp.tech;

    # Required for future certificate renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name subtrackerapp.tech www.subtrackerapp.tech;

    # Paths to the certificates Certbot just generated
    ssl_certificate /etc/letsencrypt/live/subtrackerapp.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/subtrackerapp.tech/privkey.pem;

    # Modern security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/staticfiles/;
    }
}