<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SubTracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal min-h-screen flex flex-col">

    <nav class="bg-blue-600 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center text-white">
            <a href="{% url 'dashboard' %}" class="font-bold text-xl hover:text-blue-200 transition">SubTracker 🚀</a>

            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="hover:underline opacity-90 hover:opacity-100">Dashboard</a>

                    <a href="{% url 'add_subscription' %}" class="bg-white text-blue-600 px-3 py-1 rounded font-bold hover:bg-gray-100 transition shadow-sm">Add New</a>

                    <span class="text-sm border-l border-blue-400 pl-4 ml-2 opacity-75">
                        {{ user.username }}
                    </span>

                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="hover:underline text-red-100 hover:text-white text-sm">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="hover:underline">Login</a>
                    <a href="{% url 'register' %}" class="bg-white text-blue-600 px-3 py-1 rounded font-bold hover:bg-gray-100 transition shadow-sm">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-8 flex-grow">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
